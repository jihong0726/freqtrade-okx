---
# Freqtrade + OKX Docker 部署配置
# 使用方法: docker compose up -d

services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    container_name: freqtrade-okx
    restart: unless-stopped
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./config.json:/freqtrade/config.json
    ports:
      - "8080:8080"   # Web UI (FreqUI)
    command: >
      trade
      --config /freqtrade/config.json
      --strategy SampleStrategy

  # ---- FreqUI Web 界面 ----
  frequi:
    image: freqtradeorg/frequi:stable
    container_name: frequi-okx
    restart: unless-stopped
    ports:
      - "3000:80"   # 浏览器访问 http://localhost:3000
    environment:
      - FREQUI_API_URL=http://freqtrade:8080/api/v1
